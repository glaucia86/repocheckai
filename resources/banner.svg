<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-labelledby="title desc">
  <title id="title">RepoCheckAI Banner</title>
  <desc id="desc">Technology banner with repository graph mark and RepoCheckAI wordmark.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B"/>
      <stop offset="45%" stop-color="#132A4D"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="100%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="markPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>

    <linearGradient id="markStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>

    <linearGradient id="checkBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.35"/>
    </filter>

    <pattern id="techGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="200" rx="14" fill="url(#bg)"/>
  <rect width="800" height="200" rx="14" fill="url(#techGrid)"/>
  <rect width="800" height="200" rx="14" fill="url(#glowLeft)"/>
  <rect width="800" height="200" rx="14" fill="url(#glowRight)"/>

  <g opacity="0.36">
    <circle cx="658" cy="56" r="2.2" fill="#CFFAFE"/>
    <circle cx="688" cy="84" r="2.2" fill="#CFFAFE"/>
    <circle cx="724" cy="66" r="2.2" fill="#CFFAFE"/>
    <circle cx="742" cy="102" r="2.2" fill="#CFFAFE"/>
    <path d="M658 56 L688 84 L724 66 L742 102" fill="none" stroke="#CFFAFE" stroke-opacity="0.55" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <g transform="translate(48,34)" filter="url(#softShadow)">
    <rect x="0" y="0" width="132" height="132" rx="32" fill="url(#markPanel)" stroke="#FFFFFF" stroke-opacity="0.24"/>
    <path d="M44 38v56m0-34h40" stroke="url(#markStroke)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="44" cy="38" r="7.5" fill="#E0F2FE"/>
    <circle cx="44" cy="94" r="7.5" fill="#E0F2FE"/>
    <circle cx="84" cy="60" r="7.5" fill="#E0F2FE"/>
    <circle cx="98" cy="98" r="17" fill="url(#checkBadge)"/>
    <path d="m89.8 97.7 5.1 5.3 9.7-10.4" fill="none" stroke="#FFFFFF" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(214,66)">
    <text x="0" y="0" fill="#E2E8F0" font-family="'Sora', 'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="800" letter-spacing="0.2">
      Repo<tspan fill="#67E8F9">Check</tspan><tspan fill="#A7F3D0">AI</tspan>
    </text>
    <text x="2" y="34" fill="#C8D4E5" font-family="'Sora', 'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="500" letter-spacing="0.25">
      AI-powered GitHub Repository Health Analyzer
    </text>
  </g>

  <g transform="translate(214,136)">
    <rect x="0" y="0" width="142" height="28" rx="14" fill="#38BDF8" fill-opacity="0.19" stroke="#38BDF8" stroke-opacity="0.35"/>
    <text x="71" y="19" text-anchor="middle" fill="#BAE6FD" font-family="'Space Mono', 'JetBrains Mono', ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="0.4">GITHUB COPILOT SDK</text>

    <rect x="152" y="0" width="108" height="28" rx="14" fill="#2DD4BF" fill-opacity="0.19" stroke="#2DD4BF" stroke-opacity="0.35"/>
    <text x="206" y="19" text-anchor="middle" fill="#99F6E4" font-family="'Space Mono', 'JetBrains Mono', ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="0.4">TYPESCRIPT</text>

    <rect x="270" y="0" width="74" height="28" rx="14" fill="#FB923C" fill-opacity="0.19" stroke="#FB923C" stroke-opacity="0.35"/>
    <text x="307" y="19" text-anchor="middle" fill="#FED7AA" font-family="'Space Mono', 'JetBrains Mono', ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="0.4">CLI</text>
  </g>
</svg>
